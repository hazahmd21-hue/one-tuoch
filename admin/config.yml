backend:
  name: github
  repo: hazahmd21-hue/one-tuoch
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"
locale: 'ar'

collections:
  - name: "products_collection"
    label: "📦 المنتجات"
    files:
      - name: "products"
        label: "قائمة المنتجات"
        file: "data/products.json"
        format: json
        fields:
          - name: "products"
            label: "المنتجات"
            widget: "list"
            fields:
              - {label: "ID", name: "id", widget: "string"}
              - {label: "الاسم", name: "name", widget: "string"}
              - {label: "الصورة", name: "image", widget: "image"}
              - {label: "السعر", name: "price", widget: "number", value_type: "int"}
              - {label: "الخصم", name: "discount", widget: "number", value_type: "int", default: 0}
              - {label: "التوفر", name: "availability", widget: "select", options: ["متوفر", "نفذت الكمية"]}
              - {label: "الفئة", name: "category", widget: "string"}
              - {label: "الوصف", name: "description", widget: "text", required: false}

  - name: "categories_collection"
    label: "🗂️ الفئات"
    files:
      - name: "categories"
        label: "قائمة الفئات"
        file: "data/categories.json"
        format: json
        fields:
          - name: "categories"
            label: "الفئات"
            widget: "list"
            fields:
              - {label: "ID", name: "id", widget: "string"}
              - {label: "الاسم", name: "name", widget: "string"}
              - {label: "الأيقونة", name: "icon", widget: "string", required: false}

