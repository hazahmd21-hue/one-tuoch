<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دخول الأدمن</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #1a1a2e; color: white; }
        .box { text-align: center; }
        input { padding: 10px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; background: #d4af37; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>أدخل كلمة مرور الأدمن</h2>
        <input type="password" id="pass" placeholder="كلمة المرور">
        <button onclick="checkPass()">دخول</button>
    </div>

    <script>
        function checkPass() {
            const pass = document.getElementById('pass').value;
            if (pass === '1445566') {
                // هنا تضع رابط صفحة الـ Admin الحقيقية التي تفتح Decap CMS
                window.location.href = 'main.html'; 
            } else {
                alert('كلمة المرور خاطئة!');
            }
        }
    </script>
</body>
</html>
